<!DOCTYPE html>
<html lang="es" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tablas de Distribución Estadística</title>
    <link rel="stylesheet" href="/src/style.css">
    
    <!-- KaTeX -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans p-2 md:p-4 transition-colors duration-200 dark:bg-slate-900 dark:text-slate-100 flex flex-col min-h-screen">

    <div class="max-w-[1400px] w-full mx-auto flex-grow flex flex-col">
        
        <!-- Controles Top -->
        <div class="flex flex-col sm:flex-row justify-between items-center gap-3 mb-4 no-print border-b border-slate-200 dark:border-slate-800 pb-3">
            
            <div class="flex items-center gap-2 w-full sm:w-auto">
                <label for="tableSelector" class="font-semibold text-slate-600 dark:text-slate-300 whitespace-nowrap">
                    <svg class="w-5 h-5 inline-block" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M3 14h18m-9-4v8m-7 0h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                    Distribución:
                </label>
                <select id="tableSelector" class="p-2 border border-slate-300 dark:border-slate-700 rounded-lg bg-white dark:bg-slate-800 focus:outline-none focus:ring-2 focus:ring-indigo-500 w-full sm:w-64">
                    <option value="">Cargando tablas...</option>
                </select>
            </div>

            <div class="flex justify-end gap-3 w-full sm:w-auto">
                <button id="toggleDarkMode" class="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 hover:bg-slate-100 dark:hover:bg-slate-700 px-4 py-2 rounded-lg shadow-sm text-sm font-semibold transition-all flex items-center gap-2">
                    <svg id="icon-moon" class="w-5 h-5 text-slate-600 dark:text-slate-300 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
                    <span id="darkText" class="text-slate-700 dark:text-slate-300">Modo Oscuro</span>
                </button>
                <button onclick="window.print()" class="bg-indigo-600 text-white hover:bg-indigo-700 hover:shadow-md px-4 py-2 rounded-lg shadow-sm text-sm font-semibold flex items-center gap-2 transition-all">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"></path></svg>
                    <span>Imprimir</span>
                </button>
            </div>
        </div>

        <header class="mb-4 text-center md:text-left">
            <h1 id="tableTitle" class="text-3xl md:text-4xl font-extrabold text-indigo-900 dark:text-indigo-400 tracking-tight">Cargando Tabla...</h1>
            <p id="tableDesc" class="text-slate-600 dark:text-slate-400 mt-2 text-lg">...</p>
            
            <div id="imageContainer" class="mt-4 xl:mt-6 flex flex-wrap gap-6 items-center justify-center md:justify-start">
                <img id="img1" src="/img/espera.webp" alt="Ilustración Principal" class="h-32 md:h-40 xl:h-48 object-contain rounded-xl shadow-sm bg-white dark:bg-slate-800 p-3 border border-slate-100 dark:border-slate-700">
                <img id="img2" src="/img/espera.webp" alt="Ilustración Secundaria" class="h-32 md:h-40 xl:h-48 object-contain rounded-xl shadow-sm bg-white dark:bg-slate-800 p-3 border border-slate-100 dark:border-slate-700">
            </div>
        </header>

        <!-- Tabla Dividida -->
        <div class="mb-4 xl:mb-8 w-full transition-colors duration-200">
            <div class="grid lg:grid-cols-2 gap-4 lg:gap-6 xl:gap-8 items-start w-full">
                
                <div class="bg-white dark:bg-slate-800 rounded-xl shadow-md border border-slate-200 dark:border-slate-700 overflow-hidden flex flex-col table-wrapper h-full">
                    <div class="bg-slate-100 dark:bg-slate-900 py-2 px-4 border-b border-slate-200 dark:border-slate-700 flex justify-between items-center no-print">
                        <span class="font-bold text-slate-700 dark:text-slate-300">Parte Z [-]</span>
                    </div>
                    <table class="stats-table text-[13px] w-full" id="zTableLeft">
                        <thead><tr id="tableHeaderRowLeft"></tr></thead>
                        <tbody id="tableBodyLeft"></tbody>
                    </table>
                </div>

                <div class="bg-white dark:bg-slate-800 rounded-xl shadow-md border border-slate-200 dark:border-slate-700 overflow-hidden flex flex-col table-wrapper h-full">
                    <div class="bg-slate-100 dark:bg-slate-900 py-2 px-4 border-b border-slate-200 dark:border-slate-700 flex justify-between items-center no-print">
                        <span class="font-bold text-slate-700 dark:text-slate-300">Parte Z [+]</span>
                    </div>
                    <table class="stats-table text-[13px] w-full" id="zTableRight">
                        <thead><tr id="tableHeaderRowRight"></tr></thead>
                        <tbody id="tableBodyRight"></tbody>
                    </table>
                </div>

            </div>
        </div>

        <!-- Calculadora de Interpolación Abajo (No se imprime) -->
        <div class="bg-indigo-50/50 dark:bg-slate-800 border-2 border-indigo-100 dark:border-slate-700 rounded-2xl p-6 mb-8 no-print shadow-sm transition-colors duration-200">
            <h2 class="text-xl font-bold text-indigo-900 dark:text-indigo-300 mb-6 flex items-center gap-2">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z"></path></svg>
                Calculadora de Interpolación y Desglose
            </h2>
            <div class="grid grid-cols-1 xl:grid-cols-2 gap-8 lg:gap-12 w-full">
                
                <!-- Probabilidad -->
                <div class="bg-white dark:bg-slate-900 rounded-xl p-5 shadow-sm border border-slate-100 dark:border-slate-700 flex flex-col w-full h-full">
                    <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">Encontrar Probabilidad interpolada (dado Z)</label>
                    <div class="flex gap-2">
                        <input type="number" id="inputZ" step="0.001" placeholder="Ej: 1.255" class="p-3 border border-slate-300 rounded-lg w-full dark:bg-slate-800 dark:border-slate-600 dark:text-white focus:ring-2 focus:ring-indigo-500 transition-all outline-none">
                        <button id="btnCalcP" class="bg-indigo-600 text-white px-5 py-2 font-medium rounded-lg hover:bg-indigo-700 shadow-sm transition-colors cursor-pointer">Calcular</button>
                    </div>
                    
                    <div class="mt-4 p-4 bg-slate-50 dark:bg-slate-800/50 rounded-lg border border-slate-100 dark:border-slate-700 flex-grow">
                        <div class="flex items-center justify-between">
                            <p class="text-sm font-medium text-slate-600 dark:text-slate-400">Resultado final $P(Z \le z)$:</p>
                            <p id="resP" class="text-xl font-bold text-indigo-700 dark:text-indigo-400 drop-shadow-sm">--</p>
                        </div>
                        
                        <!-- Panel de Desglose Matemático P -->
                        <div id="panelBreakdownP" class="hidden mt-4 pt-4 border-t border-slate-200 dark:border-slate-600">
                            <p class="text-xs font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400 mb-2">Desglose (Regla de 3)</p>
                            <div class="overflow-x-auto w-full mb-3">
                                <table class="breakdown-table w-full text-xs text-slate-700 dark:text-slate-300 bg-white dark:bg-slate-800">
                                    <thead class="bg-slate-100 dark:bg-slate-700">
                                        <tr><th>Punto Adyacente</th><th>Z (Conocido)</th><th>Probabilidad (P)</th></tr>
                                    </thead>
                                    <tbody id="pBreakdownBody"></tbody>
                                </table>
                            </div>
                            <div id="pBreakdownMath" class="text-sm text-center bg-white dark:bg-slate-900 p-2 rounded border border-slate-200 dark:border-slate-700 overflow-x-auto"></div>
                        </div>
                    </div>
                </div>

                <!-- Z Inverso -->
                <div class="bg-white dark:bg-slate-900 rounded-xl p-5 shadow-sm border border-slate-100 dark:border-slate-700 flex flex-col w-full h-full">
                    <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">Encontrar Z interpolada (dada Probabilidad)</label>
                    <div class="flex gap-2">
                        <input type="number" id="inputP" step="0.0001" min="0" max="1" placeholder="Ej: 0.9500" class="p-3 border border-slate-300 rounded-lg w-full dark:bg-slate-800 dark:border-slate-600 dark:text-white focus:ring-2 focus:ring-teal-500 transition-all outline-none">
                        <button id="btnCalcZ" class="bg-teal-600 text-white px-5 py-2 font-medium rounded-lg hover:bg-teal-700 shadow-sm transition-colors cursor-pointer">Calcular</button>
                    </div>
                    
                    <div class="mt-4 p-4 bg-slate-50 dark:bg-slate-800/50 rounded-lg border border-slate-100 dark:border-slate-700 flex-grow">
                        <div class="flex items-center justify-between">
                            <p class="text-sm font-medium text-slate-600 dark:text-slate-400">Resultado final $z$:</p>
                            <p id="resZ" class="text-xl font-bold text-teal-700 dark:text-teal-400 drop-shadow-sm">--</p>
                        </div>
                        
                        <!-- Panel de Desglose Matemático Z -->
                        <div id="panelBreakdownZ" class="hidden mt-4 pt-4 border-t border-slate-200 dark:border-slate-600">
                            <p class="text-xs font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400 mb-2">Desglose Matemático</p>
                            <div class="overflow-x-auto w-full mb-3">
                                <table class="breakdown-table w-full text-xs text-slate-700 dark:text-slate-300 bg-white dark:bg-slate-800">
                                    <thead class="bg-slate-100 dark:bg-slate-700">
                                        <tr><th>Punto Adyacente</th><th>Probabilidad (P)</th><th>Acumulado (Z)</th></tr>
                                    </thead>
                                    <tbody id="zBreakdownBody"></tbody>
                                </table>
                            </div>
                            <div id="zBreakdownMath" class="text-sm text-center bg-white dark:bg-slate-900 p-2 rounded border border-slate-200 dark:border-slate-700 overflow-x-auto"></div>
                        </div>
                    </div>
                </div>
                
            </div>
        </div>

    </div>

    <!-- Script inicial para prevenir flashes -->
    <script>
        if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.documentElement.classList.add('dark');
        }
    </script>
    <script type="module" src="/src/main.ts"></script>
</body>
</html>
